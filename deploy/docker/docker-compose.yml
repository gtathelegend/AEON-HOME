version: "3.8"

services:
  backend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: aeon_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
      - "9090:9090"
    environment:
      - AEON_API_HOST=0.0.0.0
      - AEON_API_PORT=8000
      - AEON_SERIAL_PORT=/dev/ttyUSB0
      - AEON_SERIAL_BAUD=115200
      - AEON_USE_NPU=true
      - AEON_MODEL_DIR=/app/backend/models/bin
      - AEON_MEMORY_DB=/app/backend/data/aeon_memory.db
      - SARVAM_OFFLINE=true
    volumes:
      - aeon_data:/app/backend/data
    devices:
      # Pass through USB serial for Arduino Sentinel
      - /dev/ttyUSB0:/dev/ttyUSB0
    privileged: true # Required on some systems to access NPU/DSP hardware devices directly

  frontend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: aeon_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8001
      - NITRO_PORT=3000
      - NITRO_HOST=0.0.0.0
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: aeon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/aeon.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: aeon_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

volumes:
  aeon_data:
