<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>ÆON Home</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  body { overflow-y: auto; }

  .phone {
    max-width: 520px;
    margin: 0 auto;
    padding: 22px 18px calc(28px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .phone header {
    padding: 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  /* mic */
  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .mic {
    width: 132px; height: 132px;
    border-radius: 50%;
    border: 1px solid var(--rule-2);
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, background .2s, color .2s;
  }
  .mic:active { background: var(--ink); color: var(--bg); }
  .mic[data-listening="true"] {
    border-color: var(--ink);
    animation: ring 1.4s ease-in-out infinite;
  }
  @keyframes ring {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,0,0,.22) }
    50%     { box-shadow: 0 0 0 14px rgba(0,0,0,0) }
  }

  .heard {
    min-height: 34px;
    text-align: center;
    color: var(--ink-2);
    font-size: 13px;
    line-height: 1.5;
  }
  .heard b { color: var(--ink); font-weight: 400; }

  /* say-it input */
  .say { display: flex; gap: 8px; }
  .say input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--rule-2);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 13px;
    outline: none;
  }
  .say input:focus { border-color: var(--ink-3); }
  .say input::placeholder { color: var(--ink-4); }

  /* device tiles */
  .tiles { display: flex; flex-direction: column; gap: 12px; }

  .tile {
    border: 1px solid var(--rule-2);
    padding: 15px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 13px 12px;
    align-items: center;
  }
  .tile[data-on="true"]      { border-color: var(--ink); }
  .tile[data-online="false"] { border-style: dashed; opacity: .5; }

  .tile .nm { font-size: 11px; letter-spacing: 0.16em; display: flex; align-items: center; }
  .tile .val { font-size: 22px; line-height: 1; text-align: right; }
  .tile[data-on="false"] .val { color: var(--ink-4); }
  .tile .ctl { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 2px; background: var(--rule-2); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ink); cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ink); border: 0; cursor: pointer;
  }

  .pow {
    font-family: var(--mono); font-size: 10px; letter-spacing: .16em;
    text-transform: uppercase; padding: 7px 11px;
    border: 1px solid var(--rule-2); background: transparent;
    color: var(--ink); cursor: pointer; min-width: 62px;
  }
  .pow[data-on="true"] { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .status {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3);
  }
</style>
</head>
<body>
<div class="phone">

  <header>
    <div class="wordmark"><b>ÆON</b> HOME</div>
    <div class="label"><span class="dot" id="link-dot"></span><span id="link-text">···</span></div>
  </header>

  <div class="mic-wrap">
    <button class="mic" id="mic" data-listening="false">Hold&nbsp;to&nbsp;speak</button>
    <div class="heard" id="heard">Say a preference once.<br><span class="dim-2">“Set the AC to 25 degrees at 9 PM”</span></div>
  </div>

  <div class="say">
    <input id="say-text" placeholder="or type it — AC ko 23 degree pe chalao 9 baje"
           autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="say-go">Send</button>
  </div>

  <div>
    <div class="label" style="margin-bottom:11px">Devices</div>
    <div class="tiles" id="tiles"></div>
  </div>

  <div>
    <div class="label" style="margin-bottom:11px">Learned this week</div>
    <ul class="learned" id="learned"></ul>
  </div>

  <div class="status">
    <span>Model <b id="st-model">--</b></span>
    <span id="st-clock">--:--</span>
    <span>Nothing leaves the house</span>
  </div>

</div>
<script src="/static/phone.js"></script>
</body>
</html>
